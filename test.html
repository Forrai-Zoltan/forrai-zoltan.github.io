
<style>
:root[data-theme="light"] {
  --track-bg: #ccc7bc;
  --thumb-bg: #1a1714;
}
:root[data-theme="dark"] {
  --track-bg: #2e2c2a;
  --thumb-bg: #f0ece3;
}

body {
  margin: 0;
  height: 100vh;
  display: grid;
  place-items: center;
  transition: .3s;
}


.toggle {
  position: relative;
  width: 56px;
  height: 28px;
  cursor: pointer;
}

.toggle input {
  position: absolute;
  opacity: 0;
}

.track {
  position: absolute;
  inset: 0;
  background: var(--track-bg);
  border-radius: 28px;
  transition: .3s;
}

.thumb {
  position: absolute;
  top: 4px;
  left: 4px;
  width: 20px;
  height: 20px;
  background: var(--thumb-bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
}

.toggle input:checked ~ .thumb { transform: translateX(28px); }

</style>


<label class="toggle">
  <input type="checkbox" id="toggle">
  <span class="track"></span>
  <span class="thumb">
  </span>
</label>


<script>
const html = document.documentElement;
const toggle = document.getElementById("toggle");
const key = "theme";

// load (default = dark)
const saved = localStorage.getItem(key);
const theme = saved || "dark";

html.setAttribute("data-theme", theme);
toggle.checked = theme === "dark";

// toggle
toggle.onchange = () => {
  const next = toggle.checked ? "dark" : "light";
  html.setAttribute("data-theme", next);
  localStorage.setItem(key, next);
};
</script>
