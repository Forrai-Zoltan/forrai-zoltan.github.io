<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Zoltán Forrai" />
    <script src="/mobile.js"></script>
    <title>Obsessions</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preload" href="/assets/socrates-middle-finger.png" as="image" />
    <link rel="preload" href="/assets/spotify-placeholder.png" as="image" />
  </head>
  <body>
    <header>
      <nav id="site-title-bar" aria-label="Site Title"></nav>
      <nav id="breadcrumbs" aria-label="Breadcrumb"></nav>
      <nav id="dropdown-menu" aria-label="Main Menu"></nav>
    </header>
    <script src="/navigation.js"></script>
    <main>
      <section>
        <article>
          <form action="" id="obsession-search">
            <div>
              <input
                name="filter"
                type="text"
                placeholder="Filter..." /><button>
                <img src="/assets/search.svg" alt="" />
              </button>
            </div>
            <label for="filter"
              >You can filter by the #tags or names of the cards.</label
            >
          </form>
        </article>
        <h1 style="margin: 0 0 40px 0; padding: 0 55px; font-size: 2rem">
          My Current Obsessions
        </h1>
        <div id="obsession-deck">
          <div
            class="obsession-card"
            onkeydown="if(event.key === 'Enter') window.open('https://github.com/kittinan/spotify-github-profile', '_blank')"
            onclick="window.open('https://github.com/kittinan/spotify-github-profile', '_blank')">
            <img
              title="Currently Listening To..."
              id="spotifyWidget"
              src="https://spotify-github-profile.kittinanx.com/api/view?uid=11160815676&cover_image=true&theme=default&show_offline=false&background_color=121212&interchange=true"
              alt="" />
            <img
              id="spotifyWidgetPlaceholder"
              src="/assets/spotify-placeholder.png"
              alt="" />
          </div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
          <div class="obsession-card"></div>
        </div>
      </section>
    </main>
    <script src="/script.js"></script>
    <script>
      function refreshSpotifyWidget() {
        const img = document.getElementById("spotifyWidget");
        const baseUrl = img.src.split("?")[0];
        const params = new URLSearchParams(img.src.split("?")[1]);
        params.set("t", Date.now());
        img.src = `${baseUrl}?${params.toString()}`;
      }
      setInterval(refreshSpotifyWidget, 30000);
    </script>
  </body>
</html>
