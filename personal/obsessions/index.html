<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Zoltán Forrai" />
    <script src="/assets/src/js/mobile.js"></script>
    <title>Obsessions</title>
    <link rel="stylesheet" href="/assets/src/css/style.css" />
    <link
      rel="preload"
      href="/assets/media/img/socrates-middle-finger.png"
      as="image" />
    <link
      rel="preload"
      href="/assets/media/img/spotify-placeholder.png"
      as="image" />
  </head>
  <body>
    <header>
      <nav id="site-title-bar" aria-label="Site Title"></nav>
      <nav id="breadcrumbs" aria-label="Breadcrumb"></nav>
      <nav id="dropdown-menu" aria-label="Main Menu"></nav>
    </header>
    <script src="/assets/src/js/navigation.js"></script>
    <main>
      <section class="non-text">
        <article>
          <form action="" id="search-bar">
            <p
              aria-live="polite"
              id="noResults"
              style="
                display: none;
                color: orangered;
                position: absolute;
                top: 130px;
                text-align: center;
                width: 100%;
                z-index: 100;
              ">
              No results found.
            </p>
            <div>
              <input
                id="search"
                name="filter"
                type="text"
                placeholder="Filter..." /><button disabled>
                <img src="/assets/media/svg/search.svg" alt="" />
              </button>
            </div>
            <label for="filter"
              >You can filter cards by #tags or text, or use <kbd>-</kbd> before
              a term to exclude items.</label
            >
          </form>
        </article>
        <h1 style="margin: 0 0 40px 0; padding: 0 55px; font-size: 2rem">
          My Current Obsessions
        </h1>
        <div id="deck">
          <div
            data-tags="spotify music song"
            class="card"
            onkeydown="if(event.key === 'Enter') window.open('https://spotify-github-profile.kittinanx.com/api/view?uid=11160815676&redirect=true', '_blank', 'noopener', 'noreferrer')"
            onclick="window.open('https://spotify-github-profile.kittinanx.com/api/view?uid=11160815676&redirect=true', '_blank', 'noopener', 'noreferrer')">
            <img
              title="Currently Listening To..."
              id="spotifyWidget"
              src="https://spotify-github-profile.kittinanx.com/api/view?uid=11160815676&cover_image=true&theme=default&show_offline=false&background_color=121212&interchange=false"
              alt="" />
            <img
              id="spotifyWidgetPlaceholder"
              src="/assets/media/img/spotify-placeholder.png"
              alt="" />
          </div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
          <div data-tags="" class="card"></div>
        </div>
      </section>
    </main>
    <script src="/assets/src/js/script.js"></script>
    <script src="/assets/src/js/card.js"></script>
    <script>
      function refreshSpotifyWidget() {
        const img = document.getElementById("spotifyWidget");
        const baseUrl = img.src.split("?")[0];
        const params = new URLSearchParams(img.src.split("?")[1]);
        params.set("t", Date.now());
        img.src = `${baseUrl}?${params.toString()}`;
      }
      setInterval(refreshSpotifyWidget, 30000);
    </script>
  </body>
</html>
