<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/src/js/mobile.js"></script>
    <link rel="stylesheet" href="/src/css/style.css" />
    <title>Films</title>
  </head>
  <body>
    <header>
      <nav id="site-title-bar" aria-label="Site Title"></nav>
      <nav id="breadcrumbs" aria-label="Breadcrumb"></nav>
      <nav id="dropdown-menu" aria-label="Main Menu"></nav>
      <script src="/src/js/nav.js"></script>
    </header>
    <main>
      <section class="non-text" id="purple-section">
        <article>
          <form action="" id="search-bar">
            <p aria-live="polite" id="noResults">No results found.</p>
            <div>
              <input
                autocomplete="off"
                id="search"
                name="filter"
                type="text"
                placeholder="Filter..." /><button disabled>
                <img src="/asset/svg/search.svg" alt="" />
              </button>
            </div>
            <label for="filter"
              >You can filter cards by #tags or text, or use <kbd>-</kbd> before
              a term to exclude items.</label
            >
          </form>
        </article>
        <h1 id="gallery-h1">My Animations and Films</h1>
        <div id="deck">
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
          <a data-tags="" class="card"></a>
        </div>
      </section>
    </main>
  </body>
  <script src="/src/js/script.js"></script>
  <script src="/src/js/card.js"></script>
</html>
