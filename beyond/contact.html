<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/src/js/mobile.js"></script>
    <link rel="stylesheet" href="/src/css/style.css" />
    <title>Contact</title>
  </head>
  <body>
    <header>
      <nav id="site-title-bar" aria-label="Site Title"></nav>
      <nav id="breadcrumbs" aria-label="Breadcrumb"></nav>
      <nav id="dropdown-menu" aria-label="Main Menu"></nav>
      <script src="/src/js/nav.js"></script>
    </header>
    <main>
      <section id="purple-section">
        <h1 id="contact">Share your Mind</h1>
        <form
          id="contact-form"
          action="https://formsubmit.co/694b1edbc83eb5971410e2bbfeeb3b21"
          method="POST">
          <fieldset>
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="William Shakespeare"
              autocomplete="off"
              autofocus
              required />

            <label for="email">Email (Optional)</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="shakespeare@globe.uk"
              autocomplete="off" />

            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="4"
              placeholder="Uneasy lies the head that wears the crown..."
              autocomplete="off"
              required></textarea>
            <input type="text" name="_honey" style="display: none" />
            <input type="hidden" name="_captcha" value="false" />
            <button type="submit">Send</button>
            <input
              type="hidden"
              name="_next"
              value="https://forrai-zoltan.github.io/meta/contact/thanks?name=name" />
          </fieldset>
        </form>
      </section>
    </main>
  </body>
  <script src="/src/js/script.js"></script>
</html>
