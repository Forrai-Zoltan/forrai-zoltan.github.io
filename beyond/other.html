<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Other Works・gildrom.com</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const isDark = saved ? saved === "dark" : prefersDark;
        document.documentElement.id = isDark ? "dark" : "light";
      })();
    </script>
    <script type="module" src="/index.js"></script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body data-page="deck">
    <header>
      <title-bar>
        <a href="/">
          <img width="30" height="30" src="/favicon.ico" />
          <span>Part&#8209;Time&nbsp;Writer. Full&#8209;Time&nbsp;Wizard.</span>
        </a>
      </title-bar>
      <nav>
        <ul>
          <li tabindex="0" data-icon="personal">
            <b>Personal</b>
            <ul>
              <li><a href="/personal/about">Who am I?</a></li>
              <li><a href="/personal/obsessions">Obsessions</a></li>
              <li><a href="/personal/library">Library</a></li>
            </ul>
          </li>
          <li tabindex="0" data-icon="literary">
            <b>Literary</b>
            <ul>
              <li><a href="/literary/fiction">Fiction</a></li>
              <li><a href="/literary/poetry">Poetry</a></li>
              <li><a href="/literary/essays">Essays</a></li>
            </ul>
          </li>
          <li tabindex="0" data-icon="tavern">
            <b>Tavern</b>
            <ul>
              <li><a href="/tavern/contact">Contact</a></li>
              <li><a href="/tavern/warbler">Warbler</a></li>
              <li><a href="/tavern/patronage">Patronage</a></li>
            </ul>
          </li>
          <li tabindex="0" data-icon="beyond">
            <b>Beyond</b>
            <ul>
              <li><a href="/beyond/other">Other Works</a></li>
              <li><a href="/beyond/secret">Secret</a></li>
              <li><a href="/beyond/epilogue">Epilogue</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <main-box>
        <form>
          <search>
            <input
              type="search"
              name="filter"
              autocomplete="off"
              placeholder="FICTION・Filter Cards" />
            <input
              type="reset"
              value="X"
              title="clear search"
              aria-label="clear search" />
          </search>
        </form>
        <deck-section>
          <a
            class="dark"
            id="NG"
            target="_blank"
            rel="noopener noreferrer"
            href="https://gildrom.newgrounds.com/"
            data-tags="newgrounds art">
            <title-span>My Newgrounds</title-span>
            <br />
          </a>
        </deck-section>
      </main-box>
    </main>
  </body>
</html>
